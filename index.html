<!DOCTYPE html>
<html>
<body>
  <button id="scanButton">Skenovat knihu</button>
  <p id="output">Čekám na přiložení knihy, nová verze...</p>

  <script>
    document.getElementById('scanButton').addEventListener('click', async () => {
      if ('NDEFReader' in window) {
        try {
          const reader = new NDEFReader();
          await reader.scan();
          reader.onreading = event => {
            // Získáme raw data z tagu
            const data = new Uint8Array(event.message.records[0].data.buffer);
  
            // Převedeme bajty na řetězec
            // Pokud víme, že tam jsou jen čísla v ASCII, stačí:
            const idKnihy = Array.from(data)
              .map(b => String.fromCharCode(b))
              .join('');
    
            console.log("ID knihy je:", idKnihy);
            document.getElementById('output').innerText = "Načteno ID: " + idKnihy;
          };
        } catch (error) {
          document.getElementById('output').innerText = "Chyba: " + error;
        }
      } else {
        document.getElementById('output').innerText = "Web NFC není v tomto prohlížeči podporováno.";
      }
    });
  </script>
</body>
</html>
